# Core
server=1
daemon=1
txindex=1
dbcache=2048

# Default network section, only used when NOT running -regtest
listen=1
port=8333
maxconnections=40
discover=1

# RPC for default network
rpcbind=127.0.0.1
rpcallowip=127.0.0.1
rpcport=8332
rpcuser=bitcoin
rpcpassword=bitcoin

# Logging
debug=net
logtimestamps=1

# Default-network peers
addnode=192.168.1.101
addnode=192.168.1.102
addnode=192.168.1.103
addnode=192.168.1.104

[regtest]
server=1
daemon=1
txindex=1
dbcache=2048

# RPC
rpcbind=127.0.0.1
rpcbind=192.168.1.101
rpcallowip=127.0.0.1
rpcallowip=192.168.1.0/24
rpcport=18443
rpcuser=bitcoin
rpcpassword=bitcoin

# P2P
listen=1
port=18444
maxconnections=40
discover=0
dnsseed=0
fixedseeds=0

# Wallet / fee convenience
fallbackfee=0.0002

# Logging
debug=net
logtimestamps=1

# Regtest peers
addnode=192.168.1.102:18444
addnode=192.168.1.103:18444
addnode=192.168.1.104:18444
